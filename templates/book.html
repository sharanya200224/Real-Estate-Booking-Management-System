

{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-dark text-white text-center rounded-top-4 p-4">

                    <h2>

                        <i class="bi bi-house-check-fill text-warning"></i>

                        Property Booking

                    </h2>

                </div>

                <div class="card-body p-5">
                    {% if error %}

                    <div class="alert alert-danger text-center">

                        {{ error }}

                    </div>

                    {% endif %}

                    <form action="{% url 'book_property' book.id %}" method="POST">

                        {% csrf_token %}

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-building"></i>

                                Property Name

                            </label>

                            <input type="text"
                                   value="{{ book.property_type }}"
                                   class="form-control form-control-lg"
                                   readonly>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-geo-alt-fill"></i>

                                Area

                            </label>

                            <input type="text"
                                   value="{{ book.area }}"
                                   class="form-control form-control-lg"
                                   readonly>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-person-fill"></i>

                                Owner Name

                            </label>

                            <input type="text"
                                   value="{{ book.owner_name }}"
                                   class="form-control form-control-lg"
                                   readonly>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-cash-stack"></i>

                                Rent Amount

                            </label>

                            <input type="text"
                                   value="₹{{ book.price }}"
                                   class="form-control form-control-lg"
                                   readonly>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-wallet2"></i>

                                Advance Amount

                            </label>

                            <input type="text"
                                   value="₹{{ advance }}"
                                   class="form-control form-control-lg"
                                   readonly>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-bold">

                                <i class="bi bi-credit-card-fill"></i>

                                Token Advance

                            </label>

                            <input type="number"
                                   name="token"
                                   class="form-control form-control-lg"
                                   placeholder="Enter token advance"
                                   required>

                            <p class="text-danger mt-2">

                                <i class="bi bi-exclamation-circle-fill"></i>

                                Token advance must be 10% or greater than advance amount

                            </p>

                        </div>

                        <div class="d-grid">

                            <button type="submit"
                                    class="btn btn-success btn-lg rounded-3">

                                <i class="bi bi-bookmark-check-fill"></i>

                                Book Property

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
