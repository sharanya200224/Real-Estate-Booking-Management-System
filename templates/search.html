<div class="row">

    {% for i in result %}

    <div class="col-12 mb-4">

        <div class="card shadow">

            <a href="{% url 'property_details' i.id %}">

                <img src="{{ i.property_image.url }}"
                     class="card-img-top"
                     style="height:350px;object-fit:cover;">

            </a>

            <div class="card-body">

                <h3>{{ i.name }}</h3>

                <p><strong>Price:</strong> ₹ {{ i.price }}</p>

                <p><strong>City:</strong> {{ i.city }}</p>

                <a href="{% url 'property_details' i.id %}"
                   class="btn btn-primary">
                    View Details
                </a>

            </div>

        </div>

    </div>

    {% empty %}

    <div class="col-12">
        <h4>No Properties Found</h4>
    </div>

    {% endfor %}

</div>
